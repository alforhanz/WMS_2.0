    <div id="carga" style="margin-top: -7px;"></div>
    <div class="container">
      <div id="resultadoGeneral">
        <div class="row">
          <div id="menup">
            <div class="dash-style">
              <div class="col-md-3 col-sm-5  small-box">
                <table class="card-info">
                  <tr>
                    <td>
                      <img src="img/pedidosdash.jpg" style="width: 92px;"/>
                    </td>
                    <td>
                      <span>Pedidos<br>Solicitados</span>
                      <div class="title-card-dash" id="pedidos_solicitados"></div>
                    </td>
                  </tr>
                </table>
              </div>
              <div class="col-md-3 col-sm-5  small-box">
                <table class="card-info">
                  <tr>
                    <td>
                      <img src="img/Articulos.jpg" style="width: 92px;"/>
                    </td>
                    <td>
                      <span>Artículos <br>Solicitados</span>
                      <div class="title-card-dash" id="articulos_solicitados"></div>
                    </td>
                  </tr>
                </table>
              </div>
              <div class="col-md-3 col-sm-5  small-box">
                <table class="card-info">
                  <tr>
                    <td>
                      <img src="img/Pendientes.jpg" style="width: 92px;" />
                    </td>
                    <td>
                      <span>Artículos <br>Pendientes</span>
                      <div class="title-card-dash" id="articulos_pendientes"></div>
                    </td>
                  </tr>
                </table>
              </div>
              <div class="col-md-3 col-sm-5  small-box">
                <table class="card-info">
                  <tr>
                    <td>
                      <img src="img/Prioridad.jpg" style="width: 92px;" />
                    </td>
                    <td>
                      <span class="align-self-md-center">Artículos <br>con Prioridad</span>
                      <div class="title-card-dash" id="articulos_prioridad"></div>
                    </td>
                  </tr>
                </table>
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <h5 class="menuTitulo">Estadísticas y Gráficos</h5>
          <div class="collection">
            <div class="dash-style" style="padding: 5%;">
              <div class="col-md-12 col-sm-12  bg-white">
                <div class="x_title">
                  <h5>Artículos pedidos según clase</h5>
                  <div class="clearfix"></div>
                </div>

                <div class="col-md-12 col-sm-12 ">
                  <div>
                    <p>Aditivos</p>
                    <div class="">
                      <div class="progress">
                        <div class="determinate" style="width: 80%"></div>
                      </div>
                    </div>
                  </div>
                  <div>
                    <p>Llantas</p>
                    <div class="">
                      <div class="progress">
                        <div class="determinate" style="width: 60%"></div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="col-md-12 col-sm-12 ">
                  <div>
                    <p>Lubricantes</p>
                    <div class="">
                      <div class="progress">
                        <div class="determinate" style="width: 40%"></div>
                      </div>
                    </div>
                  </div>
                  <div>
                    <p>Accesorios</p>
                    <div class="">
                      <div class="progress">
                        <div class="determinate" style="width: 50%"></div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="col-md-12 col-sm-12 ">
                  <div>
                    <p>Filtros</p>
                    <div class="">
                      <div class="progress">
                        <div class="determinate" style="width: 40%"></div>

                  <div>
                    <p>Baterias</p>
                    <div class="">
                      <div class="progress">
                        <div class="determinate" style="width: 50%"></div>
                      </div>
                    </div>

                </div>
              </div>
