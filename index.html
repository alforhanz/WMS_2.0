<!DOCTYPE html>
<html>

<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <meta name="google" content="notranslate">

  <!--Import Google Icon Font-->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <!--Import materialize.css-->
  <link type="text/css" rel="stylesheet" href="css/materialize.min.css" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/loginStyle.css" media="screen,projection" />
  <link rel="icon" href="/img/wms.ico" />
  <!--Let browser know website is optimized for mobile-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="">
  <title>Login - WMS</title>

  <!--JavaScript at end of body for optimized loading-->
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.3/jquery.js" defer></script>
  <script type="text/javascript" src="js/materialize.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@9" defer></script>
</head>

<body id="login" class="white" tabindex="-1">
  <main class="centerMainClass">
    <!-- <div class="container"> -->
    <div class="respConteClass">
      <div class="row">

        <form class="login-form">
          <div class="row">
            <div class="input-field col s12 center">
              <img src="img/Logo2.png" alt="Imagen de encabezado" class="imgLogin">
            </div>
          </div>
          <div class="row margin">
            <div class="input-field col s12">
              <i class="material-icons prefix">person</i>
              <input id="username" type="text" name="username" class="validate" required="required" />
              <label for="username">Usuario</label>
            </div>
          </div>
          <div class="row margin">
            <div class="input-field col s12">
              <i class="material-icons prefix">lock</i>
              <input id="password" type="password" name="password" class="validate" required="required"
                style="position: relative;" /><span>
                <i id="Mostrar" class="material-icons" style="position: absolute;right: 10px;top: 0;">visibility</i>
              </span>
              <label for="password">Contraseña</label>
            </div>
          </div>
          <div class="row">
            <div class="input-field col s12 m12 l12 login-text">
              <label>
                <input type="checkbox" name="remember-me" id="remember-me" />
                <span>Recordar</span>
              </label>
            </div>
          </div>
          <br>
          <br>
          <div class="row">
            <div class="input-field col s12">
              <button class="buttonAnimateClass" onclick="login()">INGRESAR</button>
              <div class="contenedor-buscador"></div>
            </div>
          </div>
          <br>
        </form>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script type="text/javascript" src="js/environment.js?v1.0" defer></script>
  <script type="text/javascript" src="js/master.js?v1.0" defer></script>

  <script>
    window.location.hash = "no-back-button";
    window.location.hash = "Again-No-back-button";//esta linea es necesaria para chrome
    window.onhashchange = function () { window.location.hash = "no-back-button"; }       
  </script>

  <!-- Script para recordar usuario y contraseña para futuras sesiones -->
  <script type="text/javascript">
    const rmCheck = document.getElementById("remember-me"),
      emailInput = document.getElementById("username");

    let password = document.getElementById('password');
    let Mostrar = document.getElementById('Mostrar');
    let click = false;
    Mostrar.addEventListener('click', (e) => {
      if (!click) {
        password.type = 'text'
        document.getElementById('Mostrar').textContent = 'visibility_off'
        click = true
      } else if (click) {
        password.type = 'password'
        document.getElementById('Mostrar').textContent = 'visibility'
        click = false
      }
    })

    if (localStorage.checkbox && localStorage.checkbox !== "") {
      rmCheck.setAttribute("checked", "checked");
      emailInput.value = localStorage.username;
      password.value = localStorage.password;
    } else {
      rmCheck.removeAttribute("checked");
      emailInput.value = "";
    }

    window.onload = function () {
      Object.keys(localStorage).forEach(function (key) {
        localStorage.removeItem(key);
      });
    }      
  </script>
  <!-- Scripts -->

</body>

</html>
